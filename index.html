<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@font-face {
  font-family: "DOS";
  src: url("https://file.garden/ZswAc6hgIRcOzeXF/Web437_DOS-V_re_ANK24.woff2") format("woff2");
}

@font-face {
  font-family: "Basiic";
  src: url("https://devbydee.github.io/lastfm-widget/basiic.ttf") format("truetype");
}

html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  color: #f0e7dc;
  font-family: "DOS", monospace;
  font-size: 11px;
  line-height: 1.35;
  overflow: hidden;
}

.lastfm-widget {
  width: 100%;
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 9px;
  align-items: center;
}

.cover-wrap {
  width: 54px;
  height: 54px;
  background: rgba(240, 231, 220, 0.07);
  border: 1px solid rgba(240, 231, 220, 0.14);
  padding: 2px;
  flex-shrink: 0;
}

.cover-wrap img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  filter:
    grayscale(0.35)
    sepia(0.38)
    saturate(0.75)
    brightness(0.92)
    contrast(0.95);
}

.track-info {
  min-width: 0;
  overflow: hidden;
}

.now-playing {
  display: inline-block;
  margin-bottom: 3px;
  font-size: 9px;
  color: rgba(240, 231, 220, 0.5);
}

.song {
  color: rgba(255, 248, 240, 0.9);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.artist,
.album {
  color: rgba(240, 231, 220, 0.62);
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.album {
  margin-top: 2px;
  opacity: 0.78;
}

a {
  color: inherit;
  text-decoration: none;
}

.loading,
.error {
  color: rgba(240, 231, 220, 0.58);
  font-size: 11px;
}
</style>
</head>

<body>
  <a id="lastfm-link" href="https://www.last.fm/user/deofi" target="_blank">
    <div class="lastfm-widget">
      <div class="cover-wrap">
        <img
          id="cover"
          src="https://cdn.imgchest.com/files/e47cd02d0ccb.gif"
          alt="album cover">
      </div>

      <div class="track-info">
        <div id="status" class="now-playing">loading last.fm...</div>
        <div id="song" class="song">...</div>
        <div id="artist" class="artist"></div>
        <div id="album" class="album"></div>
      </div>
    </div>
  </a>

<script>
const LASTFM_USERNAME = "deofi";
const LASTFM_API_KEY = "a2be517f739bcad9ea9b996940c97d0c";

const API_URL =
  "https://ws.audioscrobbler.com/2.0/?" +
  "method=user.getrecenttracks" +
  "&user=" + encodeURIComponent(LASTFM_USERNAME) +
  "&api_key=" + encodeURIComponent(LASTFM_API_KEY) +
  "&format=json" +
  "&limit=1";

const coverEl = document.getElementById("cover");
const statusEl = document.getElementById("status");
const songEl = document.getElementById("song");
const artistEl = document.getElementById("artist");
const albumEl = document.getElementById("album");
const linkEl = document.getElementById("lastfm-link");

function sendHeight() {
  const height = document.documentElement.scrollHeight;
  window.parent.postMessage(
    {
      type: "d-lastfm-height",
      height: height
    },
    "*"
  );
}

function getBestImage(images) {
  if (!Array.isArray(images)) return "";

  const usable = images
    .map(img => img["#text"])
    .filter(Boolean);

  return usable[usable.length - 1] || "";
}

async function loadLastfm() {
  try {
    const response = await fetch(API_URL + "&cache=" + Date.now());

    if (!response.ok) {
      throw new Error("Last.fm request failed");
    }

    const data = await response.json();
    const track = data?.recenttracks?.track?.[0];

    if (!track) {
      throw new Error("No track found");
    }

    const isNowPlaying = track["@attr"]?.nowplaying === "true";
    const song = track.name || "unknown song";
    const artist = track.artist?.["#text"] || "unknown artist";
    const album = track.album?.["#text"] || "unknown album";
    const image = getBestImage(track.image);

    statusEl.textContent = isNowPlaying ? "now playing" : "last played";
    songEl.textContent = song;
    artistEl.textContent = artist;
    albumEl.textContent = album ? "album: " + album : "album unknown";

    if (image) {
      coverEl.src = image;
    }

    if (track.url) {
      linkEl.href = track.url;
    }

    requestAnimationFrame(sendHeight);
  } catch (error) {
    statusEl.textContent = "last.fm unavailable";
    songEl.textContent = "could not load song";
    artistEl.textContent = "";
    albumEl.textContent = "";
    requestAnimationFrame(sendHeight);
  }
}

loadLastfm();
setInterval(loadLastfm, 60000);

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
new ResizeObserver(sendHeight).observe(document.body);
</script>
</body>
</html>
